name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Get Version Name
      id: get_version
      run: |
        VERSION=$(grep "versionName =" app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version $VERSION"

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: MoxEquipLog-v${{ steps.get_version.outputs.VERSION_NAME }}-Debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v${{ steps.get_version.outputs.VERSION_NAME }}
        name: Release v${{ steps.get_version.outputs.VERSION_NAME }}
        body: |
          Automatic build of Mox EquipLog.
          Version: ${{ steps.get_version.outputs.VERSION_NAME }}
          Generated on: ${{ github.event.head_commit.timestamp }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
